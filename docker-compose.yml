services:
  postgres:
    image: postgres:16-alpine
    container_name: mestre-liu-artur-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: liu
      POSTGRES_PASSWORD: artur123
      POSTGRES_DB: mestre_liu_artur
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liu -d mestre_liu_artur"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
